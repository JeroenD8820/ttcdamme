name: Update TTC Damme Data

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      - name: Run data update scripts
        run: |
          python get_all_rankings.py
          python get_team_calendars.py
          python get_match_details.py
          python json_to_js.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js scraped_player_stats.json team_calendars.json match_details.json
          git diff --staged --quiet || git commit -m "Automatisch VTTL data update"
          git push
